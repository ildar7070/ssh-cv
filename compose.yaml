# Default compose file for local development with `make up`.
# For consuming the prebuilt image, see README "Quickstart".
services:
  ssh-cv:
    build: .
    container_name: ssh-cv
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      # Persist host key so the server's SSH identity stays stable across restarts.
      - sshcv_data:/data
      # Hot-edit content without rebuilding the image. Falls back to the
      # bundled example if content.toml does not exist locally.
      - ./content.toml:/app/content.toml:ro

volumes:
  sshcv_data:
