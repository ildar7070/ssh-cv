# Default compose file for local development (`docker compose up -d --build`).
# Seed content.toml first: cp content.example.toml content.toml
# For consuming the prebuilt image, see README "Quickstart".
services:
  ssh-cv:
    build: .
    container_name: ssh-cv
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      # Persist host key so the server's SSH identity stays stable across restarts.
      - sshcv_data:/data
      # Hot-edit content without rebuilding the image.
      # create_host_path: false makes Docker refuse to silently create a
      # directory at ./content.toml if the file is missing — without it,
      # a missing source becomes an empty directory that breaks the next
      # `compose up` with a confusing "not a directory" mount error.
      - type: bind
        source: ./content.toml
        target: /app/content.toml
        read_only: true
        bind:
          create_host_path: false

volumes:
  sshcv_data:
