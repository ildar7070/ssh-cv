# ──────────────────────────────────────────────────────────────────────
#  ssh-cv content file
#
#  Everything except `name` is optional. Each [[sections]] block becomes
#  one tab in the TUI; leave a section out to drop the tab.
#
#  Save this as `content.toml`, edit, then start the container:
#
#    docker run -d -p 2222:2222 \
#      -v $PWD/content.toml:/app/content.toml:ro \
#      -v sshcv_data:/data \
#      ghcr.io/ildar7070/ssh-cv:latest
#
#  Connect:
#
#    ssh -p 2222 localhost
# ──────────────────────────────────────────────────────────────────────

name    = "Jane Doe"
tagline = "Software engineer, occasional gardener."

# ─── Splash ───────────────────────────────────────────────────────────
# The entry screen shown before the visitor presses Enter.
# Both fields are optional. title defaults to `name`, cta to the line below.
[splash]
title = "jd"
cta   = "Press Enter to start"

# ─── Theme ────────────────────────────────────────────────────────────
# Override individual palette colors. Any field you omit keeps the built-in
# default. Values must be #RRGGBB hex.
#
# [theme]
# accent     = "#7ee787"   # primary highlight (tab active, headings)
# accent2    = "#d2a8ff"   # secondary (subtitles)
# foreground = "#e6edf3"
# muted      = "#7d8590"
# background = "#0d1117"   # used for inverse text on accent
# selection  = "#1f2a1f"   # list item selection background

# ─── Sections ─────────────────────────────────────────────────────────
# Each [[sections]] block becomes one tab in the order listed here.
#
# Required fields per section:
#   id    — stable identifier, unique across sections
#   type  — which renderer to use; see below
#   label — text shown in the tab header (defaults to capitalised `id`)
#
# Supported types:
#   text   — heading from name/tagline + free-form paragraph lines
#   list   — 30/70 list/detail layout (good for CV, projects, education)
#   links  — label / value rows (good for contact pages — values are
#            underlined so terminals can detect them as URLs)
#
# Adding a new renderer is a code change (one file in
# internal/tui/sections/) and does not require schema changes.

# ─── text section ─────────────────────────────────────────────────────
[[sections]]
id    = "start"
type  = "text"
label = "Start"
lines = [
  "I build software that ships — distributed systems, developer tools,",
  "and the occasional weekend experiment that gets out of hand.",
  "",
  "Currently available for consulting engagements.",
]

# ─── list section ─────────────────────────────────────────────────────
# items become rows in the left pane. The selected row's full detail
# (title + subtitle + meta + summary + bullets) renders on the right.
[[sections]]
id    = "experience"
type  = "list"
label = "Experience"

[[sections.items]]
title    = "Senior Software Engineer"
subtitle = "Acme Corp"
meta     = "2022 — Present"
summary  = "Backend platform, distributed systems, developer experience."
bullets  = [
  "Led migration from monolith to event-driven services.",
  "Mentored 4 engineers; ran the internal Go guild.",
  "Reduced p99 API latency by 60% on the core service.",
]

[[sections.items]]
title    = "Software Engineer"
subtitle = "Previous Co."
meta     = "2019 — 2022"
summary  = "Full-stack work across web and infra."
bullets  = [
  "Owned the billing pipeline end to end.",
  "Introduced infrastructure-as-code (Terraform) to the team.",
]

# Education is just another list section — no special renderer needed.
[[sections]]
id    = "education"
type  = "list"
label = "Education"

[[sections.items]]
title    = "B.Sc. Computer Science"
subtitle = "State University"
meta     = "2015 — 2019"
summary  = "Distributed systems, compilers, a bit of operations research."

# Another list section, this time for personal projects.
[[sections]]
id    = "projects"
type  = "list"
label = "Projects"

[[sections.items]]
title    = "ssh-cv"
subtitle = "This site. Personal CV served over SSH."
meta     = "https://github.com/ildar7070/ssh-cv"
bullets  = [
  "A terminal-first personal site. Visitors connect with ssh and",
  "navigate through tabs and lists with the keyboard — no browser,",
  "no JavaScript, no tracking.",
  "",
  "Built with Go, Charm Wish, and Bubble Tea.",
]

[[sections.items]]
title    = "garden-log"
subtitle = "What I planted, what survived, what didn't."
bullets  = [
  "A small static-site experiment tracking which tomato varieties",
  "actually produced anything in zone 7b. Surprisingly fun.",
]

# ─── links section ────────────────────────────────────────────────────
# Label-value rows. Values render underlined so terminal URL detectors
# pick them up for click-to-open.
[[sections]]
id    = "contact"
type  = "links"
label = "Contact"

[[sections.items]]
label = "email"
value = "jane@example.com"

[[sections.items]]
label = "github"
value = "https://github.com/janedoe"

[[sections.items]]
label = "linkedin"
value = "https://www.linkedin.com/in/janedoe/"
